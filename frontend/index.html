<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EasyRead</title>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,100..800;1,100..800&family=Martian+Mono:wght@100..800&display=swap");
      :root {
        --primary-bg: #1e1e1e;
        --secondary-bg: #333;
        --accent-color: #dcef4a;
        --text-color: #d1d1d1;
        --placeholder-color: #a0a0a0;
        --hover-bg: #444;
        --scrollbar-track: #2c2c2c;
        --scrollbar-thumb: #444;
        --scrollbar-thumb-hover: #555;
      }

      body {
        margin: 0;
        padding: 0;
        font-family: "JetBrains Mono", monospace;
        display: flex;
        flex-direction: column;
        justify-content: flex-start;
        align-items: center;
        height: 100vh;
        background-color: var(--primary-bg);
        overflow: hidden; /* Hide default scrollbars */
      }

      h1 {
        font-family: "Martian Mono";
      }

      .heading-container {
        margin-top: 5%;
        text-align: center;
      }

      .heading-container h1 {
        font-size: 2.5rem;
        color: var(--accent-color);
      }

      .search-container {
        width: 100%;
        display: flex;
        justify-content: center;
        margin-bottom: 20px;
      }

      .search-container input {
        width: 60%;
        max-width: 400px;
        padding: 12px;
        font-size: 18px;
        border-radius: 5px;
        box-sizing: border-box;
        color: var(--text-color);
        border: none;
        background-color: var(--secondary-bg);
        font-family: "JetBrains Mono";
      }

      .search-container input:focus {
        outline: none;
      }

      .search-container input::placeholder {
        color: var(--placeholder-color);
      }

      .book-container {
        width: 60%;
        max-width: 400px;
        margin-bottom: 30px;
        max-height: 300px;
        overflow-y: auto;
      }

      .book-button {
        font-family: "JetBrains Mono";
        font-weight: bold;
        width: 100%;
        padding: 12px;
        font-size: 18px;
        color: var(--text-color);
        background-color: transparent;
        border: none;
        border-radius: 5px;
        margin: 8px 0;
        cursor: pointer;
        text-align: left;
      }

      .book-button:hover {
        background-color: var(--hover-bg);
      }

      /* Custom Scrollbar Styling */
      .book-container::-webkit-scrollbar {
        width: 8px;
      }

      .book-container::-webkit-scrollbar-track {
        background-color: var(--scrollbar-track);
        border-radius: 10px;
      }

      .book-container::-webkit-scrollbar-thumb {
        background-color: var(--scrollbar-thumb);
        border-radius: 10px;
        border: 2px solid var(--secondary-bg);
      }

      .book-container::-webkit-scrollbar-thumb:hover {
        background-color: var(--scrollbar-thumb-hover);
      }
    </style>
  </head>
  <body>
    <div class="heading-container">
      <h1>EasyRead</h1>
    </div>
    <div class="search-container">
      <input
        type="text"
        id="search-input"
        placeholder="Search..."
        oninput="searchBooks()"
      />
    </div>
    <div class="book-container" id="book-container"></div>

    <script>
      // Fetch books from library.json and load them into the container
      async function loadBooks() {
        const bookContainer = document.getElementById("book-container");
        bookContainer.innerHTML = ""; // Clear existing content

        try {
          const response = await fetch("json/library.json"); // Fetch JSON file
          if (!response.ok) {
            throw new Error(`HTTP error! Status: ${response.status}`);
          }
          const booksData = await response.json(); // Parse JSON data

          booksData.forEach((book) => {
            const button = document.createElement("button");
            button.className = "book-button";
            button.textContent = book.title;
            button.onclick = () => (window.location.href = book.link);
            bookContainer.appendChild(button);
          });
        } catch (error) {
          console.error("Error loading books:", error);
          bookContainer.innerHTML = `<p style="color: red;">Failed to load books. Please try again later.</p>`;
        }
      }

      // Search functionality
      function searchBooks() {
        const input = document.getElementById("search-input");
        const filter = input.value.toLowerCase();
        const buttons = document.querySelectorAll(".book-button");

        buttons.forEach((button) => {
          const bookText = button.textContent || button.innerText;
          if (bookText.toLowerCase().includes(filter)) {
            button.style.display = "";
          } else {
            button.style.display = "none";
          }
        });
      }

      // Load books on page load
      window.onload = loadBooks;
    </script>
  </body>
</html>
